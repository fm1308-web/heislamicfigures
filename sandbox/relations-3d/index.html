<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gold Ark — Relations 3D</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06060f;color:#f5f0e8}
#c{position:fixed;inset:0;display:block;cursor:grab}
#c.dragging{cursor:grabbing}
#overlay{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.p-label{
  position:absolute;font:11px/1.2 Georgia,serif;
  color:rgba(245,240,232,.80);
  text-shadow:0 0 10px #000,0 0 5px #000;
  white-space:nowrap;pointer-events:none;
  transform:translate(13px,-50%);transition:opacity .15s
}
.p-label.focus-lbl{
  font-size:14px;font-weight:700;color:#ffe47a;
  letter-spacing:.03em;transform:translate(-50%,-170%);
  text-shadow:0 0 20px rgba(255,200,0,.55),0 0 7px #000
}
.p-label.group-lbl{
  font-size:13px;font-weight:700;color:#fff;
  letter-spacing:.01em;transform:translate(14px,-50%);
  text-shadow:0 0 14px #000,0 0 6px #000,0 0 28px rgba(0,0,0,.9)
}
.tick-label{
  position:absolute;pointer-events:none;
  text-align:right;line-height:1.4;user-select:none
}
.tick-ce{font:10px/1 Georgia,serif;color:rgba(212,168,74,.80)}
.tick-ah{font:9px/1 Georgia,serif;color:rgba(212,168,74,.36)}
#legend{
  position:fixed;top:18px;left:18px;
  background:rgba(6,6,15,.88);border:1px solid rgba(212,168,74,.18);
  border-radius:2px;padding:13px 16px 11px;
  pointer-events:none;backdrop-filter:blur(4px)
}
.leg-hd{font:9px/1 Georgia,serif;letter-spacing:.13em;text-transform:uppercase;
  color:rgba(212,168,74,.55);margin-bottom:10px}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-lbl{font:11px/1 Georgia,serif;color:rgba(245,240,232,.62)}
#nav-bar{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;pointer-events:auto;z-index:10
}
#breadcrumb{font:12px Georgia,serif;color:rgba(245,240,232,.50);
  max-width:440px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc{color:#d4a84a}.sep{color:#444;margin:0 5px}
#back-btn{
  padding:4px 12px;background:rgba(6,6,15,.88);
  border:1px solid rgba(212,168,74,.30);border-radius:1px;
  color:#d4a84a;font:11px Georgia,serif;cursor:pointer;transition:background .15s
}
#back-btn:hover{background:rgba(212,168,74,.12)}
#back-btn.hidden{display:none}
#mode-badge{
  position:fixed;top:46px;left:50%;transform:translateX(-50%);
  font:9px/1 Georgia,serif;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(212,168,74,.40);pointer-events:none;white-space:nowrap
}
#info-panel{
  position:fixed;top:50%;right:20px;transform:translateY(-50%);
  width:222px;background:rgba(6,6,15,.93);
  border:1px solid rgba(212,168,74,.24);border-radius:2px;
  padding:17px 17px 14px;pointer-events:auto;
  backdrop-filter:blur(6px);z-index:10
}
#info-panel.hidden{display:none}
.ip-close{position:absolute;top:8px;right:11px;cursor:pointer;
  color:rgba(255,255,255,.28);font-size:14px;line-height:1;transition:color .15s}
.ip-close:hover{color:#e8c878}
.ip-name{font:600 14px/1.3 Georgia,serif;color:#e8c878;margin-bottom:4px;padding-right:14px}
.ip-years{font:11px/1 Georgia,serif;color:#888;margin-bottom:6px}
.ip-title{font:italic 11px/1.4 Georgia,serif;color:#aaa;margin-bottom:9px;min-height:2px}
.ip-rel{font:11px/1 Georgia,serif;color:#8ab4d4;
  margin-bottom:12px;padding:5px 7px;
  background:rgba(90,155,212,.07);border-left:2px solid #5a9bd4;border-radius:0 2px 2px 0}
.ip-drill{
  display:block;width:100%;padding:7px 0;background:transparent;
  border:1px solid rgba(212,168,74,.30);border-radius:1px;
  color:#d4a84a;font:11px Georgia,serif;cursor:pointer;text-align:center;transition:background .15s
}
.ip-drill:hover{background:rgba(212,168,74,.10)}
#hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font:11px/1.5 Georgia,serif;color:rgba(245,240,232,.28);
  pointer-events:none;white-space:nowrap;text-align:center
}
#count-badge{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  font:10px/1 Georgia,serif;letter-spacing:.06em;
  color:rgba(245,240,232,.20);pointer-events:none;white-space:nowrap
}
#loading{
  position:fixed;inset:0;background:#06060f;
  display:flex;align-items:center;justify-content:center;z-index:200
}
#loading.gone{display:none}
.ld-inner{text-align:center}
.ld-ring{
  width:40px;height:40px;margin:0 auto 16px;
  border:2px solid rgba(212,168,74,.12);
  border-top-color:#d4a84a;border-radius:50%;animation:spin .75s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-msg{font:13px Georgia,serif;color:#888;margin-bottom:6px}
.ld-err{color:#c88;margin-top:12px;font:12px/1.6 Georgia,serif;
  max-width:380px;text-align:left;padding:12px;
  border:1px solid rgba(200,100,100,.2);background:rgba(200,100,100,.04)}
/* ---- tools bar (top-right) ---- */
#tools-bar{
  position:fixed;top:14px;right:18px;
  display:flex;gap:8px;align-items:flex-start;
  pointer-events:auto;z-index:10
}
.tool-btn{
  padding:4px 11px;background:rgba(6,6,15,.88);
  border:1px solid rgba(212,168,74,.28);border-radius:1px;
  color:#d4a84a;font:11px Georgia,serif;
  cursor:pointer;transition:background .15s;white-space:nowrap
}
.tool-btn:hover{background:rgba(212,168,74,.12)}
.tool-btn.active{background:rgba(212,168,74,.18);border-color:rgba(212,168,74,.55)}

/* ---- search ---- */
#search-wrap{position:relative}
#search-input{
  display:block;width:210px;margin-top:4px;
  padding:5px 10px;
  background:rgba(6,6,15,.97);
  border:1px solid rgba(212,168,74,.35);border-radius:1px;
  color:#f5f0e8;font:12px Georgia,serif;outline:none
}
#search-input::placeholder{color:rgba(245,240,232,.30)}
#search-results{
  position:absolute;top:100%;left:0;width:100%;
  background:rgba(6,6,15,.98);
  border:1px solid rgba(212,168,74,.22);border-top:none;
  max-height:260px;overflow-y:auto;z-index:20
}
.sr-item{
  padding:7px 10px;cursor:pointer;
  font:11px/1.3 Georgia,serif;color:rgba(245,240,232,.78);
  border-bottom:1px solid rgba(255,255,255,.04)
}
.sr-item:hover{background:rgba(212,168,74,.10);color:#fff}
.sr-type{font-size:10px;color:#888;margin-left:6px}

/* ---- path panel ---- */
#path-wrap{position:relative}
#path-panel{
  position:absolute;top:calc(100% + 4px);right:0;
  width:264px;
  background:rgba(6,6,15,.96);
  border:1px solid rgba(212,168,74,.22);border-radius:2px;
  padding:14px 14px 12px;z-index:20
}
.pp-hd{font:9px/1 Georgia,serif;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(212,168,74,.55);margin-bottom:12px}
.pp-lbl{font:10px/1 Georgia,serif;color:#888;margin-bottom:4px}
.pp-iw{position:relative;margin-bottom:8px}
.pp-inp{
  width:100%;padding:5px 8px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(212,168,74,.22);border-radius:1px;
  color:#f5f0e8;font:11px Georgia,serif;outline:none
}
.pp-ac{
  position:absolute;top:100%;left:0;width:100%;
  background:rgba(6,6,15,.98);
  border:1px solid rgba(212,168,74,.18);border-top:none;
  max-height:130px;overflow-y:auto;z-index:30;display:none
}
#path-find-btn{
  width:100%;padding:6px 0;margin-top:2px;
  background:transparent;
  border:1px solid rgba(212,168,74,.30);border-radius:1px;
  color:#d4a84a;font:11px Georgia,serif;cursor:pointer;transition:background .15s
}
#path-find-btn:hover{background:rgba(212,168,74,.10)}
#path-result{
  margin-top:10px;font:11px/1.8 Georgia,serif;
  color:rgba(245,240,232,.72);max-height:190px;overflow-y:auto
}
.ps-row{display:flex;align-items:baseline;gap:6px;margin-bottom:1px}
.ps-num{color:#666;font-size:10px;flex-shrink:0;width:14px;text-align:right}
.ps-name{color:#e8c878;cursor:pointer}
.ps-name:hover{text-decoration:underline}
.ps-rel{font-size:10px;color:rgba(212,168,74,.50);font-style:italic;flex-shrink:0}
.ps-arrow{color:#444;font-size:10px;flex-shrink:0}
#path-walk-btn{
  display:block;width:100%;padding:6px 0;margin-top:8px;
  background:rgba(212,168,74,.08);
  border:1px solid rgba(212,168,74,.25);border-radius:1px;
  color:#d4a84a;font:11px Georgia,serif;cursor:pointer;transition:background .15s
}
#path-walk-btn:hover{background:rgba(212,168,74,.14)}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="tick-layer"></div>
  <div id="label-layer"></div>
</div>
<div id="legend">
  <div class="leg-hd">Relations</div>
  <div class="leg-row"><span class="leg-dot" style="background:#d4a84a"></span><span class="leg-lbl">Prophet</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#2fa6a0"></span><span class="leg-lbl">Teachers</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#5a9bd4"></span><span class="leg-lbl">Parents</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#b06cc4"></span><span class="leg-lbl">Spouses</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#9a7ad9"></span><span class="leg-lbl">Siblings</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#6fa86f"></span><span class="leg-lbl">Family</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#c9a227"></span><span class="leg-lbl">Companions</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#d97a3a"></span><span class="leg-lbl">Students</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#c87a9a"></span><span class="leg-lbl">Narrators</span></div>
  <div class="leg-row"><span class="leg-dot" style="background:#b83030"></span><span class="leg-lbl">Adversaries</span></div>
</div>
<div id="nav-bar">
  <div id="breadcrumb"></div>
  <button id="back-btn" class="hidden">← Back</button>
</div>
<div id="mode-badge">GROUP VIEW</div>
<div id="info-panel" class="hidden">
  <span class="ip-close" id="ip-close">✕</span>
  <div class="ip-name"  id="ip-name"></div>
  <div class="ip-years" id="ip-years"></div>
  <div class="ip-title" id="ip-title"></div>
  <div class="ip-rel"   id="ip-rel"></div>
  <button class="ip-drill" id="ip-drill">Explore this person →</button>
</div>
<div id="tools-bar">
  <!-- Search -->
  <div id="search-wrap">
    <button class="tool-btn" id="search-btn">⌕ Search</button>
    <input id="search-input" type="text" placeholder="Search any figure…" autocomplete="off" spellcheck="false" style="display:none">
    <div id="search-results" style="display:none"></div>
  </div>
  <!-- Path finder -->
  <div id="path-wrap">
    <button class="tool-btn" id="path-btn">Path ⟲</button>
    <div id="path-panel" style="display:none">
      <div class="pp-hd">Find Connection</div>
      <div class="pp-lbl">From</div>
      <div class="pp-iw">
        <input class="pp-inp" id="path-from" type="text" autocomplete="off" placeholder="Current figure">
        <div class="pp-ac" id="path-from-ac"></div>
      </div>
      <div class="pp-lbl">To</div>
      <div class="pp-iw">
        <input class="pp-inp" id="path-to" type="text" autocomplete="off" placeholder="Search target…">
        <div class="pp-ac" id="path-to-ac"></div>
      </div>
      <button id="path-find-btn">Find shortest path</button>
      <div id="path-result"></div>
      <button id="path-walk-btn" style="display:none">Walk path →</button>
    </div>
  </div>
</div>
<div id="hint">colour bands = relation groups · click to explore · drag to spin · scroll to zoom</div>
<div id="count-badge"></div>
<div id="loading">
  <div class="ld-inner">
    <div class="ld-ring"></div>
    <div class="ld-msg" id="ld-msg">Loading data…</div>
    <div class="ld-err" id="ld-err" style="display:none"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

/* ================================================================
   Gold Ark — Relations 3D
   Two-level view: GROUP (one wishbone per relation type) →
                   DETAIL (individual wishbones, expanded timescale)
   Spine segmented: dimmed pre/post lifespan, coloured during life.
   Prophets are always gold.
   ================================================================ */

// ---------------------------------------------------------------
// DATA GLOBALS
// ---------------------------------------------------------------
var CORE=null,NAME_VARIANTS=null,ENRICH_BY_SLUG={};
var NAME2SLUG=null,CORE_BY_SLUG={},STUDENTS_OF=null;

// ---------------------------------------------------------------
// DATA LOGIC — ported from relations.js
// ---------------------------------------------------------------
function _norm(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

function buildResolver(){
  if(NAME2SLUG) return;
  NAME2SLUG={}; CORE_BY_SLUG={};
  for(var i=0;i<CORE.length;i++){
    var c=CORE[i]; if(!c||!c.slug) continue;
    CORE_BY_SLUG[c.slug]=c;
    var kf=_norm(c.famous||''); if(kf) NAME2SLUG[kf]=c.slug;
    var kn=_norm(c.full||'');   if(kn&&!NAME2SLUG[kn]) NAME2SLUG[kn]=c.slug;
  }
  if(NAME_VARIANTS){
    for(var sl in NAME_VARIANTS){
      if(!NAME_VARIANTS.hasOwnProperty(sl)) continue;
      var e=NAME_VARIANTS[sl];
      var arr=Array.isArray(e)?e:[].concat(e.spellings||[],e.titles||[]);
      for(var a=0;a<arr.length;a++){ var k=_norm(arr[a]); if(k) NAME2SLUG[k]=sl; }
    }
  }
}
function resolveName(n){ buildResolver(); return NAME2SLUG[_norm(n)]||null; }
function getEnrich(s)  { return ENRICH_BY_SLUG[s]||null; }

function buildReverseTeachers(){
  if(STUDENTS_OF) return; buildResolver(); STUDENTS_OF={};
  for(var i=0;i<CORE.length;i++){
    var c=CORE[i]; if(!c||!c.slug) continue;
    if(c.dob!=null&&c.dod!=null){var ls=c.dod-c.dob;if(ls>0&&ls<13)continue;}
    var tn=[];
    if(Array.isArray(c.teachers)) tn=tn.concat(c.teachers);
    var ce=getEnrich(c.slug); if(ce&&Array.isArray(ce.teachers)) tn=tn.concat(ce.teachers);
    var seen={};
    for(var t=0;t<tn.length;t++){
      var tt=tn[t]; if(typeof tt==='object') tt=tt.name||tt.english_name||'';
      tt=String(tt||'').trim(); if(!tt) continue;
      var ts=resolveName(tt); if(!ts||ts===c.slug||seen[ts]) continue;
      seen[ts]=1; (STUDENTS_OF[ts]||(STUDENTS_OF[ts]=[])).push(c);
    }
  }
}

var CONN_COLOR={
  parent:'#5a9bd4',teacher:'#2fa6a0',student:'#d97a3a',
  companion:'#c9a227',family:'#6fa86f',sibling:'#9a7ad9',
  wife:'#b06cc4',narration:'#c87a9a',adversary:'#b83030'
};
var KIND_LABELS={
  teacher:'Teachers',parent:'Parents',wife:'Spouses',
  sibling:'Siblings',family:'Family',companion:'Companions',
  student:'Students',narration:'Narrators',adversary:'Adversaries'
};
var KIND_ORDER=['teacher','parent','wife','sibling','family','companion','student','narration','adversary'];
// Kinds that always show as individuals (never grouped), regardless of count
var ALWAYS_EXPAND={wife:1,sibling:1};

var PARENT_RELS={father:1,mother:1,parent:1,'foster mother':1,'foster father':1,'milk mother':1,'wet nurse':1};
var SIBLING_RELS={brother:1,sister:1,sibling:1,'half-brother':1,'half-sister':1};
var WIFE_RELS={wife:1,husband:1,spouse:1};

function bucketRel(rel){
  var r=(rel||'').toLowerCase().trim();
  if(PARENT_RELS[r])                                    return 'parent';
  if(SIBLING_RELS[r])                                   return 'sibling';
  if(WIFE_RELS[r])                                      return 'wife';
  if(r==='companion')                                   return 'companion';
  if(r==='student'||r==='silsila after'
     ||r==='has follower')                              return 'student';
  if(r==='teacher'||r==='silsila before'
     ||r==='follower of')                               return 'teacher';
  if(r==='narration'||r==='narrator')                   return 'narration';
  if(r==='adversary')                                   return 'adversary';
  return 'family';
}

function getRelations(focusSlug){
  var f=CORE_BY_SLUG[focusSlug]; if(!f) return [];
  buildReverseTeachers();
  var out=[],seen={};
  function push(fig,kind,relWord){
    if(!fig||!fig.slug||fig.slug===focusSlug||seen[fig.slug]) return;
    seen[fig.slug]=1; out.push({fig:fig,kind:kind,relWord:relWord||kind});
  }
  var tn=[]; if(Array.isArray(f.teachers)) tn=tn.concat(f.teachers);
  var enr=getEnrich(focusSlug); if(enr&&Array.isArray(enr.teachers)) tn=tn.concat(enr.teachers);
  for(var i=0;i<tn.length;i++){
    var t=tn[i]; if(typeof t==='object') t=t.name||t.english_name||'';
    t=String(t||'').trim(); if(!t) continue;
    var sl=resolveName(t); if(!sl||!CORE_BY_SLUG[sl]) continue;
    push(CORE_BY_SLUG[sl],'teacher','teacher');
  }
  var studs=STUDENTS_OF[focusSlug]||[];
  for(var j=0;j<studs.length;j++) push(studs[j],'student','student');
  if(Array.isArray(f.relations)){
    for(var k=0;k<f.relations.length;k++){
      var r=f.relations[k]; if(!r||!r.person) continue;
      var sl2=resolveName(r.person); if(!sl2||!CORE_BY_SLUG[sl2]) continue;
      push(CORE_BY_SLUG[sl2],bucketRel(r.relation),r.relation);
    }
  }
  if(enr){
    if(enr.parents){
      var ps=typeof enr.parents==='string'?enr.parents.split('/'):(Array.isArray(enr.parents)?enr.parents:[]);
      for(var p=0;p<ps.length;p++){
        var pn=(typeof ps[p]==='string'?ps[p]:((ps[p]&&(ps[p].name||ps[p].english_name))||'')).trim();
        if(!pn) continue;
        var sl3=resolveName(pn); if(!sl3||!CORE_BY_SLUG[sl3]) continue;
        push(CORE_BY_SLUG[sl3],'parent','parent');
      }
    }
    if(Array.isArray(enr.family)){
      for(var m=0;m<enr.family.length;m++){
        var fn=typeof enr.family[m]==='string'?enr.family[m]:((enr.family[m]&&(enr.family[m].name||enr.family[m].english_name))||'');
        fn=(fn||'').trim(); if(!fn) continue;
        var sl4=resolveName(fn); if(!sl4||!CORE_BY_SLUG[sl4]) continue;
        push(CORE_BY_SLUG[sl4],'family','family');
      }
    }
  }
  return out;
}

// ---------------------------------------------------------------
// ADJACENCY GRAPH + PATH FINDER (BFS)
// ---------------------------------------------------------------
function _buildAdj(){
  if(_ADJ) return;
  buildResolver(); buildReverseTeachers();
  _ADJ={};
  function addE(a,b,lbl){
    if(!a||!b||a===b||!CORE_BY_SLUG[a]||!CORE_BY_SLUG[b]) return;
    (_ADJ[a]||(_ADJ[a]=[])).push({s:b,l:lbl});
  }
  for(var i=0;i<CORE.length;i++){
    var c=CORE[i]; if(!c||!c.slug) continue;
    // Teachers array
    var tn=[];
    if(Array.isArray(c.teachers)) tn=tn.concat(c.teachers);
    var enr=getEnrich(c.slug); if(enr&&Array.isArray(enr.teachers)) tn=tn.concat(enr.teachers);
    for(var t=0;t<tn.length;t++){
      var tt=tn[t]; if(typeof tt==='object') tt=tt.name||tt.english_name||'';
      tt=String(tt||'').trim(); if(!tt) continue;
      var ts=resolveName(tt); if(!ts||ts===c.slug) continue;
      addE(c.slug,ts,'student of'); addE(ts,c.slug,'teacher of');
    }
    // Relations array
    if(Array.isArray(c.relations)){
      for(var r=0;r<c.relations.length;r++){
        var rel=c.relations[r]; if(!rel||!rel.person) continue;
        var rs=resolveName(rel.person); if(!rs||rs===c.slug) continue;
        addE(c.slug,rs,rel.relation||'related');
      }
    }
  }
  // STUDENTS_OF reverse edges
  for(var tslug in STUDENTS_OF){
    if(!STUDENTS_OF.hasOwnProperty(tslug)) continue;
    var studs=STUDENTS_OF[tslug];
    for(var j=0;j<studs.length;j++){
      var st=studs[j]; if(!st||!st.slug) continue;
      addE(st.slug,tslug,'student of'); addE(tslug,st.slug,'teacher of');
    }
  }
}

/** BFS shortest path. Returns [{slug, label}, …] or null. */
function findPath(fromSlug,toSlug){
  if(!fromSlug||!toSlug) return null;
  if(fromSlug===toSlug) return [{slug:fromSlug,label:''}];
  _buildAdj();
  var visited={},prev={},queue=[fromSlug];
  visited[fromSlug]=true;
  while(queue.length){
    var curr=queue.shift();
    var nbrs=_ADJ[curr]||[];
    for(var i=0;i<nbrs.length;i++){
      var nb=nbrs[i]; if(visited[nb.s]) continue;
      visited[nb.s]=true; prev[nb.s]={from:curr,label:nb.l};
      if(nb.s===toSlug){
        var path=[],s=toSlug;
        while(s!==fromSlug){ var p=prev[s]; path.unshift({slug:s,label:p.label}); s=p.from; }
        path.unshift({slug:fromSlug,label:''});
        return path;
      }
      queue.push(nb.s);
    }
  }
  return null;
}

/** Search famous names. Returns up to maxN figure objects. */
function _searchFigs(query,maxN){
  if(!query||query.length<2) return [];
  var q=query.toLowerCase(), out=[];
  for(var i=0;i<CORE.length&&out.length<maxN;i++){
    var f=CORE[i]; if(!f||!f.slug) continue;
    if((f.famous||f.full||'').toLowerCase().indexOf(q)!==-1) out.push(f);
  }
  return out;
}

/** Fly camera to a sphere mesh (rotate + pan) */
function flyToSphere(mesh){
  if(!mesh||!mesh.position) return;
  _autoRot=false;
  if(_autoRotTimer){clearTimeout(_autoRotTimer);_autoRotTimer=null;}
  // Target rotation: bring mesh's angle to front (world Z = max → face camera)
  var sx=mesh.position.x,sz=mesh.position.z;
  var sphereAngle=Math.atan2(sz,sx);
  var targetRy=-sphereAngle;
  // Shortest arc
  var curr=sceneGroup.rotation.y;
  var diff=targetRy-curr;
  while(diff>Math.PI) diff-=Math.PI*2;
  while(diff<-Math.PI) diff+=Math.PI*2;
  _flyRyTarget=curr+diff;
  _camTargetY=mesh.position.y;
  _flyMesh=mesh;
}
var SPINE_R     = 0.055;
var BOW_R       = 3.0;
var TUBE_R      = 0.014;
var SPH_R       = 0.13;
var SPH_FOCUS_R = 0.09;   // small focus disc — spine does the talking now
var SPH_GROUP_R = 0.28;
var GOLD        = 0xd4a84a;

// Negative = earlier dates are HIGHER on screen (matches rest of app)
var YSCALE_GROUP  = -0.04;
var YSCALE_DETAIL = -0.16;

// Groups with ≤ this many members are expanded directly in group view (individual wishbones)
var AUTO_EXPAND_THRESHOLD = 5;

function _isProphet(fig){
  if(!fig) return false;
  var tags=Array.isArray(fig.tags)?fig.tags:[];
  var t=(fig.type||'').toLowerCase();
  return t==='prophet'||tags.indexOf('prophet')!==-1||tags.indexOf('Prophet')!==-1;
}
function _figColor(fig,kind){
  return _isProphet(fig)?new THREE.Color(GOLD):new THREE.Color(CONN_COLOR[kind]||'#888888');
}
function _focusSpineColor(fig){
  return _isProphet(fig)?GOLD:0xb0c0d4;  // gold for prophets, silver-blue for others
}

function _getDob(fig,focusDob){
  if(fig.dob!=null) return fig.dob;
  if(fig.dod!=null) return fig.dod-50;
  return focusDob;
}
function _yearStr(y){ return y<0?Math.abs(y)+' BCE':y+' CE'; }
function _cap(s){ return s?s[0].toUpperCase()+s.slice(1):s; }
function _esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function _hexToRgb(h){
  var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return r+','+g+','+b;
}

function _clearScene(){

/**
 * Segmented spine:
 *   - Before dob: dim grey (pre-life)
 *   - dob → dod: coloured (lifespan)
 *   - After dod: dim grey (post-life)
 * yMin/yMax are the extremes of all related figures (already in Y units).
 */
function _buildSegmentedSpine(fig, focusDob, YSCALE, yMin, yMax){
  var DIM_COL  = 0x30304a;
  var DIM_OP   = 0.55;
  var lifeCol  = _focusSpineColor(fig);

  var spineBot = yMin - 4.5;
  var spineTop = yMax + 4.5;
  _camTargetY  = (spineBot+spineTop)*0.5;

  var dobY = fig.dob!=null ? (fig.dob-focusDob)*YSCALE : null;
  var dodY = fig.dod!=null ? (fig.dod-focusDob)*YSCALE : null;

  if(dobY==null&&dodY==null){
    _addSpineSeg(spineBot,spineTop,0x666680,0.50);
    return;
  }

  // With negative YSCALE: dob (birth) is HIGHER than dod (death) on screen.
  // lifeTop = the upper (earlier) boundary, lifeBot = the lower (later) boundary.
  var lifeTop = dobY!=null ? dobY : spineTop;   // birth = higher
  var lifeBot = dodY!=null ? dodY : spineBot;   // death = lower
  // Safety swap if somehow reversed
  if(lifeTop<lifeBot){ var _t=lifeTop; lifeTop=lifeBot; lifeBot=_t; }

  // Pre-life: ABOVE birth (earlier times = higher Y)
  if(lifeTop<spineTop-0.05)
    _addSpineSeg(lifeTop,spineTop,DIM_COL,DIM_OP);

  // Lifespan (bright, coloured) — from death(low) to birth(high)
  if(lifeTop-lifeBot>0.02){
    _addSpineSeg(lifeBot,lifeTop,lifeCol,1.0);
  } else {
    _addSpineSeg(lifeTop-0.08,lifeTop+0.08,lifeCol,1.0);
  }

  // Post-life: BELOW death (later times = lower Y)
  if(lifeBot>spineBot+0.05)
    _addSpineSeg(spineBot,lifeBot,DIM_COL,DIM_OP);

  // Dob/Dod discs
  if(dobY!=null) _addSpineDisc(dobY,lifeCol,true);
  if(dodY!=null) _addSpineDisc(dodY,lifeCol,false);
}

function _addSpineSeg(yBot,yTop,color,opacity){
  var h=yTop-yBot; if(h<0.02) return;
  var geo=new THREE.CylinderGeometry(SPINE_R,SPINE_R,h,10,1);
  var mat=new THREE.MeshStandardMaterial({
    color:color,metalness:.80,roughness:.22,
    transparent:opacity<0.99,opacity:opacity,
    emissive:color,emissiveIntensity:opacity*0.12
  });
  var m=new THREE.Mesh(geo,mat); m.position.y=(yBot+yTop)*0.5; sceneGroup.add(m);
}

function _addSpineDisc(y,color,isBirth){
  // Thin flat disc at birth or death point
  var geo=new THREE.CylinderGeometry(SPINE_R*4,SPINE_R*4,0.035,16,1);
  var mat=new THREE.MeshStandardMaterial({
    color:color,metalness:.92,roughness:.08,
    emissive:color,emissiveIntensity:.60
  });
  var m=new THREE.Mesh(geo,mat); m.position.y=y; sceneGroup.add(m);
}

/**
 * Focus name label just above the dob disc (Y=0).
 */
function _buildFocusLabel(fig){
  _addLabel(fig.famous||fig.slug, 0, SPH_FOCUS_R+0.10, 0, 'focus-lbl');
}

function _buildTicks(yMin,yMax,YSCALE,focusDob){
  // Convert Y extremes back to CE years (works for positive or negative YSCALE)
  var ce1=focusDob+yMin/YSCALE;
  var ce2=focusDob+yMax/YSCALE;
  var ceMin=Math.min(ce1,ce2)-30;
  var ceMax=Math.max(ce1,ce2)+30;
  var step=Math.abs(YSCALE)>=0.12?25:50;
  var start=Math.ceil(ceMin/step)*step;
  for(var ce=start;ce<=ceMax;ce+=step){
    var ty=(ce-focusDob)*YSCALE;
    if(ty<yMin-2.5||ty>yMax+3.5) continue;
    var hijri=Math.round(ce-622);
    var el=document.createElement('div'); el.className='tick-label';
    el.innerHTML='<span class="tick-ce">'+_esc(ce<0?Math.abs(ce)+' BCE':ce+' CE')+'</span><br>'+
                 '<span class="tick-ah">'+_esc(hijri<0?Math.abs(hijri)+' BH':hijri+' AH')+'</span>';
    document.getElementById('tick-layer').appendChild(el);
    _ticks.push({el:el,wy:ty});
  }
}

/**
 * Smooth tube leg from a spine attachment point to an apex sphere.
 * ca/sa = cosine/sine of the angular direction.
 */
function _buildTubeLeg(spineY, apexY, ca, sa, col, opacity){
  var midR = SPINE_R+(BOW_R-SPINE_R)*0.50;
  var midY = spineY+(apexY-spineY)*0.55;
  var pts=[
    new THREE.Vector3(SPINE_R*ca, spineY, SPINE_R*sa),
    new THREE.Vector3(midR*ca,    midY,   midR*sa),
    new THREE.Vector3(BOW_R*ca,   apexY,  BOW_R*sa)
  ];
  var curve=new THREE.CatmullRomCurve3(pts,false,'catmullrom',0.50);
  var geo  =new THREE.TubeGeometry(curve,16,TUBE_R,5,false);
  var mat  =new THREE.MeshStandardMaterial({
    color:col,transparent:true,opacity:opacity||0.72,metalness:.08,roughness:.72
  });
  sceneGroup.add(new THREE.Mesh(geo,mat));
}

// ---------------------------------------------------------------
// GROUP VIEW
// ---------------------------------------------------------------
function buildGroupView(slug){
  viewMode='group'; detailKind=null;
  _clearScene();
  var fig=CORE_BY_SLUG[slug];
  if(!fig){ _showErr('Unknown slug: '+slug); return; }
  currentFocusSlug=slug; currentFocusFig=fig;

  var YSCALE=YSCALE_GROUP;
  var focusDob=(fig.dob!=null)?fig.dob:570;
  var rels=getRelations(slug);

  // Group by kind
  var groups={};
  for(var i=0;i<rels.length;i++){
    var kk=rels[i].kind;
    (groups[kk]||(groups[kk]=[])).push(rels[i]);
  }

  // Overall Y range (using actual dob/dod, not just dob estimates)
  var yMin=0, yMax=0;
  for(var i=0;i<rels.length;i++){
    var rf=rels[i].fig;
    var dobY=rf.dob!=null?(rf.dob-focusDob)*YSCALE:null;
    var dodY=rf.dod!=null?(rf.dod-focusDob)*YSCALE:null;
    if(dobY!=null){ if(dobY<yMin) yMin=dobY; if(dobY>yMax) yMax=dobY; }
    if(dodY!=null){ if(dodY<yMin) yMin=dodY; if(dodY>yMax) yMax=dodY; }
  }
  // Also include focus figure's own dob/dod
  if(fig.dob!=null){ var fy0=0; if(fy0<yMin)yMin=fy0; if(fy0>yMax)yMax=fy0; }
  if(fig.dod!=null){ var fy1=(fig.dod-focusDob)*YSCALE; if(fy1<yMin)yMin=fy1; if(fy1>yMax)yMax=fy1; }
  if(yMin===yMax){ yMin-=2; yMax+=2; }

  _buildSegmentedSpine(fig,focusDob,YSCALE,yMin,yMax);
  _buildFocusLabel(fig);
  _buildTicks(yMin,yMax,YSCALE,focusDob);

  var presentKinds=KIND_ORDER.filter(function(k){ return groups[k]&&groups[k].length; });
  var nK=presentKinds.length;
  var totalRels=rels.length;

  // Angle slot per kind (so they don't overlap)
  for(var ki=0;ki<nK;ki++){
    var kind=presentKinds[ki];
    var krels=groups[kind];
    var angle=(ki/nK)*Math.PI*2+(Math.PI*0.08);
    var col=new THREE.Color(CONN_COLOR[kind]||'#888');

    if(krels.length<=AUTO_EXPAND_THRESHOLD || ALWAYS_EXPAND[kind]){
      // Small group: show each person individually (wishbone per person)
      for(var gi=0;gi<krels.length;gi++){
        var subAngle=angle+(gi-(krels.length-1)*0.5)*0.28;
        _buildIndivWishbone(subAngle,krels[gi].fig,focusDob,YSCALE,
          _figColor(krels[gi].fig,kind),kind,krels[gi].relWord,true);
      }
    } else {
      // Large group: one wishbone representing the whole group
      _buildGroupWishbone(angle,kind,krels,focusDob,YSCALE,col,slug);
    }
  }

  document.getElementById('mode-badge').textContent='GROUP VIEW';
  document.getElementById('mode-badge').style.color='rgba(212,168,74,.40)';
  document.getElementById('hint').textContent='colour bands = relation groups · click large band to explore · click small sphere for info';
  document.getElementById('count-badge').textContent=
    totalRels+' relations · '+nK+' groups · '+_esc(fig.famous||slug);
  updateNavUI();
}

/**
 * Group wishbone: two legs from (earliest dob) and (latest dob) on the spine,
 * converging to a single large sphere at the temporal midpoint.
 */
function _buildGroupWishbone(angle,kind,krels,focusDob,YSCALE,col,focusSlug){
  var ca=Math.cos(angle),sa=Math.sin(angle);
  var count=krels.length;

  // Collect dob and dod Y values to find temporal range
  var allY=[];
  for(var i=0;i<krels.length;i++){
    var rf=krels[i].fig;
    if(rf.dob!=null) allY.push((rf.dob-focusDob)*YSCALE);
    if(rf.dod!=null) allY.push((rf.dod-focusDob)*YSCALE);
  }
  if(!allY.length) allY=[0];

  var kyMin=Math.min.apply(null,allY);
  var kyMax=Math.max.apply(null,allY);
  var kyMed=(kyMin+kyMax)*0.5;

  // Apex sphere (click target)
  var sGeo=new THREE.SphereGeometry(SPH_GROUP_R,12,10);
  var sMat=new THREE.MeshStandardMaterial({
    color:col,metalness:.28,roughness:.42,emissive:col,emissiveIntensity:.50
  });
  var sMesh=new THREE.Mesh(sGeo,sMat);
  sMesh.position.set(BOW_R*ca,kyMed,BOW_R*sa);
  sMesh.userData={type:'group',slug:focusSlug,kind:kind,count:count};
  sceneGroup.add(sMesh); clickTargets.push(sMesh);

  // Tube: also add as click target for easier selection
  var tubeR=Math.min(0.22,Math.max(0.08,0.06+count*0.0010));
  _buildGroupTube(angle,kyMin,kyMax,col,tubeR,focusSlug,kind,count);

  // Top leg (from kyMax on spine to apex)
  _buildTubeLeg(kyMax,kyMed,ca,sa,col,0.78);

  // Bottom leg (from kyMin on spine to apex) — only if range is significant
  if(Math.abs(kyMax-kyMin)>0.20)
    _buildTubeLeg(kyMin,kyMed,ca,sa,col,0.78);

  // Label
  _addLabel((KIND_LABELS[kind]||kind)+' · '+count,BOW_R*ca,kyMed,BOW_R*sa,'group-lbl');
}

/** Fat tube along the spine attachment range — gives the band a visible thickness */
function _buildGroupTube(angle,kyMin,kyMax,col,tubeR,focusSlug,kind,count){
  var ca=Math.cos(angle),sa=Math.sin(angle);
  var h=Math.max(0.30,kyMax-kyMin);
  var kMid=(kyMin+kyMax)*0.5;
  var geo=new THREE.CylinderGeometry(tubeR,tubeR,h,8,1);
  var mat=new THREE.MeshStandardMaterial({
    color:col,metalness:.12,roughness:.65,
    emissive:col,emissiveIntensity:.18,
    transparent:true,opacity:.70
  });
  var m=new THREE.Mesh(geo,mat);
  m.position.set(BOW_R*ca,kMid,BOW_R*sa);
  m.userData={type:'group',slug:focusSlug,kind:kind,count:count};
  sceneGroup.add(m); clickTargets.push(m);
}

// ---------------------------------------------------------------
// INDIVIDUAL WISHBONE (used both in group view for small groups
// and in detail view for all members)
// ---------------------------------------------------------------
function _buildIndivWishbone(angle,fig,focusDob,YSCALE,col,kind,relWord,showLabel){
  var ca=Math.cos(angle),sa=Math.sin(angle);

  var dobY=fig.dob!=null?(fig.dob-focusDob)*YSCALE:null;
  var dodY=fig.dod!=null?(fig.dod-focusDob)*YSCALE:null;

  // Sphere position: midpoint of lifespan if both known
  var sphereY;
  if(dobY!=null&&dodY!=null) sphereY=(dobY+dodY)*0.5;
  else if(dobY!=null)         sphereY=dobY;
  else if(dodY!=null)         sphereY=dodY-20*YSCALE; // rough backdate
  else                        sphereY=0;

  // Sphere
  var geo=new THREE.SphereGeometry(SPH_R,9,7);
  var mat=new THREE.MeshStandardMaterial({
    color:col,metalness:.22,roughness:.50,emissive:col,emissiveIntensity:.32
  });
  var mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(BOW_R*ca,sphereY,BOW_R*sa);
  mesh.userData={type:'person',fig:fig,kind:kind,relWord:relWord};
  sceneGroup.add(mesh); clickTargets.push(mesh);

  // Dob leg (from dob on spine to sphere)
  if(dobY!=null)
    _buildTubeLeg(dobY,sphereY,ca,sa,col,0.70);

  // Dod leg (from dod on spine to sphere) — only if it differs from dob
  if(dodY!=null && (dobY==null || Math.abs(dodY-dobY)>0.05))
    _buildTubeLeg(dodY,sphereY,ca,sa,col,0.55);

  // Label
  if(showLabel) _addLabel(fig.famous||fig.slug,BOW_R*ca,sphereY,BOW_R*sa,'');
}

// ---------------------------------------------------------------
// DETAIL VIEW
// ---------------------------------------------------------------
function buildDetailView(slug,kind){
  viewMode='detail'; detailKind=kind;
  _clearScene();
  var fig=CORE_BY_SLUG[slug]; if(!fig) return;
  currentFocusSlug=slug; currentFocusFig=fig;
  var YSCALE=YSCALE_DETAIL;
  var focusDob=(fig.dob!=null)?fig.dob:570;

  var allRels=getRelations(slug);
  var rels=allRels.filter(function(r){ return r.kind===kind; });
  var total=rels.length;
  var MAX_R=280;
  if(total>MAX_R) rels=rels.slice(0,MAX_R);
  var n=rels.length;

  // Sort by dob (earliest first)
  rels.sort(function(a,b){
    var da=a.fig.dob!=null?a.fig.dob:(a.fig.dod!=null?a.fig.dod-50:focusDob);
    var db=b.fig.dob!=null?b.fig.dob:(b.fig.dod!=null?b.fig.dod-50:focusDob);
    return da-db;
  });

  // Y range using actual dob AND dod
  var yMin=0,yMax=0;
  for(var i=0;i<n;i++){
    var rf=rels[i].fig;
    var dy=rf.dob!=null?(rf.dob-focusDob)*YSCALE:null;
    var dd=rf.dod!=null?(rf.dod-focusDob)*YSCALE:null;
    if(dy!=null){if(dy<yMin)yMin=dy;if(dy>yMax)yMax=dy;}
    if(dd!=null){if(dd<yMin)yMin=dd;if(dd>yMax)yMax=dd;}
  }
  if(fig.dob!=null){var fy0=0;if(fy0<yMin)yMin=fy0;if(fy0>yMax)yMax=fy0;}
  if(fig.dod!=null){var fy1=(fig.dod-focusDob)*YSCALE;if(fy1<yMin)yMin=fy1;if(fy1>yMax)yMax=fy1;}
  if(yMin===yMax){yMin-=3;yMax+=3;}

  _buildSegmentedSpine(fig,focusDob,YSCALE,yMin,yMax);
  _buildFocusLabel(fig);
  _buildTicks(yMin,yMax,YSCALE,focusDob);

  var SPREAD=Math.PI*1.45;
  var MAX_LBL=55;

  for(var i=0;i<n;i++){
    var rel=rels[i];
    var angle=n>1?-SPREAD*.5+(i/(n-1))*SPREAD:0;
    _buildIndivWishbone(angle,rel.fig,focusDob,YSCALE,
      _figColor(rel.fig,kind),kind,rel.relWord,i<MAX_LBL);
  }

  var kc=CONN_COLOR[kind]||'#888';
  document.getElementById('mode-badge').textContent='↳ '+(KIND_LABELS[kind]||kind).toUpperCase();
  document.getElementById('mode-badge').style.color=kc;
  document.getElementById('hint').textContent='each sphere: two legs = born & died on the timeline · click for info';
  document.getElementById('count-badge').textContent=
    (total>MAX_R?MAX_R+' of '+total:n)+' '+(KIND_LABELS[kind]||kind).toLowerCase()+
    ' · '+_esc(fig.famous||slug);
  updateNavUI();
}

// ---------------------------------------------------------------
// HTML OVERLAY
// ---------------------------------------------------------------
function _addLabel(text,wx,wy,wz,cls){
  var el=document.createElement('div');
  el.className='p-label'+(cls?' '+cls:'');
  el.textContent=text;
  document.getElementById('label-layer').appendChild(el);
  _labels.push({el:el,wx:wx,wy:wy,wz:wz,cls:cls});
}
function _project(wx,wy,wz){
  var v=new THREE.Vector3(wx,wy,wz);
  v.applyEuler(sceneGroup.rotation); v.project(camera);
  return{sx:(v.x+1)*.5*window.innerWidth,sy:(-v.y+1)*.5*window.innerHeight,nz:v.z};
}
function updateOverlay(){
  var ry=sceneGroup.rotation.y;
  for(var i=0;i<_labels.length;i++){
    var lb=_labels[i],p=_project(lb.wx,lb.wy,lb.wz);
    if(p.nz>=1){lb.el.style.opacity='0';continue;}
    var f;
    if(lb.cls==='focus-lbl'||lb.cls==='group-lbl') f=1.0;
    else{
      var wz2=lb.wx*Math.sin(ry)+lb.wz*Math.cos(ry);
      f=Math.max(0.08,0.18+0.82*((wz2+BOW_R)/(BOW_R*2)));
    }
    lb.el.style.opacity=f.toFixed(2);
    lb.el.style.left=p.sx+'px';
    lb.el.style.top =p.sy+'px';
  }
  for(var j=0;j<_ticks.length;j++){
    var tk=_ticks[j],p2=_project(0,tk.wy,0);
    if(p2.nz>=1){tk.el.style.opacity='0';continue;}
    tk.el.style.opacity='1';
    tk.el.style.top =(p2.sy-10)+'px';
    tk.el.style.left=(p2.sx-108)+'px';
  }
}

// ---------------------------------------------------------------
// INTERACTION
// ---------------------------------------------------------------
var _drag=false,_lastMX=0,_lastMY=0,_clickX=0,_clickY=0,_clickT=0;
var _autoRot=true,_autoRotTimer=null;
var _cvs=document.getElementById('c');
var _rc=new THREE.Raycaster(),_mp=new THREE.Vector2();

_cvs.addEventListener('pointerdown',function(e){
  _drag=true;_cvs.classList.add('dragging');
  if(_autoRotTimer){clearTimeout(_autoRotTimer);_autoRotTimer=null;}
  _autoRot=false;
  _lastMX=e.clientX;_lastMY=e.clientY;
  _clickX=e.clientX;_clickY=e.clientY;_clickT=Date.now();
  _cvs.setPointerCapture(e.pointerId);
});
_cvs.addEventListener('pointermove',function(e){
  if(!_drag)return;
  var dx=e.clientX-_lastMX,dy=e.clientY-_lastMY;
  _lastMX=e.clientX;_lastMY=e.clientY;
  sceneGroup.rotation.y+=dx*.0088;
  sceneGroup.rotation.x=Math.max(-.55,Math.min(.55,sceneGroup.rotation.x+dy*.0068));
});
_cvs.addEventListener('pointerup',function(e){
  _drag=false;_cvs.classList.remove('dragging');
  var dx=e.clientX-_clickX,dy=e.clientY-_clickY;
  if(Math.sqrt(dx*dx+dy*dy)<7&&Date.now()-_clickT<320) _handleClick(e);
  _autoRotTimer=setTimeout(function(){ _autoRot=true;_autoRotTimer=null; },4200);
});
_cvs.addEventListener('pointercancel',function(){ _drag=false;_cvs.classList.remove('dragging'); });
_cvs.addEventListener('wheel',function(e){
  e.preventDefault();
  camera.position.z=Math.max(4,Math.min(90,camera.position.z+e.deltaY*.038));
},{passive:false});

function _handleClick(e){
  var rect=_cvs.getBoundingClientRect();
  _mp.x=((e.clientX-rect.left)/rect.width)*2-1;
  _mp.y=-((e.clientY-rect.top)/rect.height)*2+1;
  _rc.setFromCamera(_mp,camera);
  var hits=_rc.intersectObjects(clickTargets);
  if(!hits.length)return;
  var hit=hits[0].object;
  if(hit.userData.type==='group'){
    buildDetailView(hit.userData.slug,hit.userData.kind);
  } else if(hit.userData.type==='person'){
    hit.scale.setScalar(1.70);
    setTimeout(function(){ if(hit)hit.scale.setScalar(1.0); },180);
    _showInfo(hit.userData.fig,hit.userData.kind,hit.userData.relWord);
  }
}

function _showInfo(fig,kind,relWord){
  document.getElementById('ip-name').textContent=fig.famous||fig.slug||'?';
  var ys='';
  if(fig.dob!=null) ys+='b. '+_yearStr(fig.dob);
  if(fig.dod!=null) ys+=(ys?'  ·  ':'')+'d. '+_yearStr(fig.dod);
  document.getElementById('ip-years').textContent=ys||'Dates unknown';
  document.getElementById('ip-title').textContent=fig.primaryTitle||'';
  var relEl=document.getElementById('ip-rel');
  if(relWord&&currentFocusFig){
    relEl.textContent=_cap(relWord)+' of '+(currentFocusFig.famous||currentFocusSlug);
    relEl.style.borderLeftColor=CONN_COLOR[kind]||'#888';
    relEl.style.background='rgba('+_hexToRgb(CONN_COLOR[kind]||'#888888')+',0.06)';
    relEl.style.display='block';
  } else {
    relEl.style.display='none';
  }
  document.getElementById('ip-drill').onclick=function(){ _drillInto(fig.slug); };
  document.getElementById('info-panel').classList.remove('hidden');
}

document.getElementById('ip-close').addEventListener('click',function(){
  document.getElementById('info-panel').classList.add('hidden');
});
document.getElementById('back-btn').addEventListener('click',function(){
  document.getElementById('info-panel').classList.add('hidden');
  if(viewMode==='detail') buildGroupView(currentFocusSlug);
  else if(focusStack.length) buildGroupView(focusStack.pop());
});
function _drillInto(slug){
  if(!CORE_BY_SLUG[slug])return;
  document.getElementById('info-panel').classList.add('hidden');
  focusStack.push(currentFocusSlug);
  buildGroupView(slug);
}
function updateNavUI(){
  var parts=[];
  for(var i=0;i<focusStack.length;i++){
    var s=focusStack[i],f=CORE_BY_SLUG[s];
    parts.push('<span class="bc">'+_esc(f?f.famous:s)+'</span>');
  }
  if(currentFocusFig)
    parts.push('<span class="bc" style="color:#ffe47a;font-weight:700">'+
               _esc(currentFocusFig.famous||currentFocusSlug)+'</span>');
  if(viewMode==='detail'&&detailKind){
    var kc=CONN_COLOR[detailKind]||'#fff';
    parts.push('<span class="bc" style="color:'+kc+'">'+
               _esc(KIND_LABELS[detailKind]||detailKind)+'</span>');
  }
  document.getElementById('breadcrumb').innerHTML=parts.join('<span class="sep">›</span>');
  document.getElementById('back-btn').classList.toggle('hidden',viewMode==='group'&&focusStack.length===0);
}

// ---------------------------------------------------------------
// ANIMATION LOOP
// ---------------------------------------------------------------
function _animate(){
  requestAnimationFrame(_animate);
  // Fly-to: smooth rotation toward target angle
  if(_flyRyTarget!==null){
    var diff=_flyRyTarget-sceneGroup.rotation.y;
    sceneGroup.rotation.y+=diff*0.10;
    if(Math.abs(diff)<0.008){
      sceneGroup.rotation.y=_flyRyTarget; _flyRyTarget=null;
      var arrived=_flyMesh; _flyMesh=null;
      if(arrived&&arrived.userData&&arrived.userData.type==='person'){
        arrived.scale.setScalar(1.8);
        setTimeout(function(){ if(arrived)arrived.scale.setScalar(1.0); },300);
        _showInfo(arrived.userData.fig,arrived.userData.kind,arrived.userData.relWord);
      }
      _autoRotTimer=setTimeout(function(){ _autoRot=true;_autoRotTimer=null; },3000);
    }
  }
  if(_autoRot&&!_drag&&_flyRyTarget===null) sceneGroup.rotation.y+=.0020;
  camera.position.y+=(_camTargetY-camera.position.y)*.055;
  camera.lookAt(0,camera.position.y,0);
  updateOverlay();
  renderer.render(scene,camera);
}

// ---------------------------------------------------------------
// DATA LOADING
// ---------------------------------------------------------------
function _setMsg(t){ var e=document.getElementById('ld-msg'); if(e) e.textContent=t; }
function _showErr(t){
  var e=document.getElementById('ld-err');
  e.innerHTML=String(t).replace(/\n/g,'<br>'); e.style.display='block';
}
async function loadAndStart(){
  try{
    _setMsg('Loading core.json…');
    var r1=await fetch('core.json');
    if(!r1.ok) throw new Error('core.json not found ('+r1.status+').\n\nCopy core.json, name_variants.json and arees_enrichment.json into the same folder as this index.html, then reload.');
    CORE=await r1.json();
    _setMsg('Loading name_variants.json…');
    try{var r2=await fetch('name_variants.json');if(r2.ok)NAME_VARIANTS=await r2.json();}catch(_){}
    _setMsg('Loading arees_enrichment.json…');
    try{
      var r3=await fetch('arees_enrichment.json');
      if(r3.ok){
        var raw=await r3.json();
        if(Array.isArray(raw)){for(var i=0;i<raw.length;i++)if(raw[i]&&raw[i].slug)ENRICH_BY_SLUG[raw[i].slug]=raw[i];}
        else if(raw&&typeof raw==='object')ENRICH_BY_SLUG=raw;
      }
    }catch(_){}
    _setMsg('Building resolver…'); buildResolver();
    _setMsg('Building student index…'); buildReverseTeachers();
    document.getElementById('loading').classList.add('gone');
    buildGroupView('F1132');
  }catch(err){
    _setMsg('Failed.'); _showErr(err.message); console.error('[3d]',err);
  }
}

// ---------------------------------------------------------------
// SEARCH UI
// ---------------------------------------------------------------
(function(){
  var searchBtn=document.getElementById('search-btn');
  var searchInput=document.getElementById('search-input');
  var searchResults=document.getElementById('search-results');
  var open=false;

  function toggleSearch(){
    open=!open;
    searchBtn.classList.toggle('active',open);
    searchInput.style.display=open?'block':'none';
    searchResults.style.display='none';
    if(open){ searchInput.value=''; searchInput.focus(); }
  }

  searchBtn.addEventListener('click',toggleSearch);

  searchInput.addEventListener('input',function(){
    var q=this.value.trim();
    if(q.length<2){ searchResults.style.display='none'; return; }
    var hits=_searchFigs(q,9);
    if(!hits.length){ searchResults.innerHTML='<div class="sr-item" style="color:#666">No results</div>'; }
    else{
      searchResults.innerHTML=hits.map(function(f){
        return '<div class="sr-item" data-slug="'+_esc(f.slug)+'">'
          +_esc(f.famous||f.slug)
          +'<span class="sr-type">'+_esc(f.type||'')+'</span>'
          +'</div>';
      }).join('');
    }
    searchResults.style.display='block';
  });

  searchResults.addEventListener('click',function(e){
    var item=e.target.closest('.sr-item');
    if(!item||!item.dataset.slug) return;
    var slug=item.dataset.slug;
    searchInput.value='';
    searchResults.style.display='none';
    toggleSearch();
    // Fly to sphere if visible, else navigate
    var found=false;
    for(var i=0;i<clickTargets.length;i++){
      var m=clickTargets[i];
      if(m.userData&&m.userData.type==='person'&&m.userData.fig.slug===slug){
        flyToSphere(m); found=true; break;
      }
    }
    if(!found){
      if(slug!==currentFocusSlug) focusStack.push(currentFocusSlug);
      buildGroupView(slug);
    }
  });

  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'&&open) toggleSearch();
  });
})();

// ---------------------------------------------------------------
// PATH FINDER UI
// ---------------------------------------------------------------
(function(){
  var pathBtn   =document.getElementById('path-btn');
  var pathPanel =document.getElementById('path-panel');
  var fromInput =document.getElementById('path-from');
  var toInput   =document.getElementById('path-to');
  var fromAc    =document.getElementById('path-from-ac');
  var toAc      =document.getElementById('path-to-ac');
  var findBtn   =document.getElementById('path-find-btn');
  var resultDiv =document.getElementById('path-result');
  var walkBtn   =document.getElementById('path-walk-btn');
  var panelOpen =false;

  var _fromSlug=null, _toSlug=null;

  function togglePanel(){
    panelOpen=!panelOpen;
    pathBtn.classList.toggle('active',panelOpen);
    pathPanel.style.display=panelOpen?'block':'none';
    if(panelOpen){
      // Pre-fill From with current figure
      if(currentFocusFig){
        fromInput.value=currentFocusFig.famous||currentFocusSlug;
        _fromSlug=currentFocusSlug;
      }
      resultDiv.innerHTML='';
      walkBtn.style.display='none';
    }
  }

  pathBtn.addEventListener('click',togglePanel);

  function makeAc(input,acDiv,onSelect){
    input.addEventListener('input',function(){
      var q=this.value.trim();
      acDiv.innerHTML='';
      acDiv.style.display='none';
      if(q.length<2) return;
      var hits=_searchFigs(q,7);
      if(!hits.length) return;
      hits.forEach(function(f){
        var d=document.createElement('div');
        d.className='sr-item';
        d.textContent=f.famous||f.slug;
        d.addEventListener('click',function(){
          input.value=f.famous||f.slug;
          acDiv.style.display='none';
          onSelect(f.slug);
        });
        acDiv.appendChild(d);
      });
      acDiv.style.display='block';
    });
    document.addEventListener('click',function(e){
      if(!input.contains(e.target)&&!acDiv.contains(e.target)) acDiv.style.display='none';
    });
  }

  makeAc(fromInput,fromAc,function(slug){ _fromSlug=slug; });
  makeAc(toInput,toAc,function(slug){ _toSlug=slug; });

  findBtn.addEventListener('click',function(){
    resultDiv.innerHTML='<span style="color:#888">Searching…</span>';
    walkBtn.style.display='none';
    _pathWalk=null;

    // Lazy-build adjacency (may take a moment)
    setTimeout(function(){
      if(!_fromSlug||!_toSlug){
        resultDiv.innerHTML='<span style="color:#c88">Select both figures.</span>';
        return;
      }
      var path=findPath(_fromSlug,_toSlug);
      if(!path){
        resultDiv.innerHTML='<span style="color:#c88">No connection found.</span>';
        return;
      }
      // Render path
      var html='<div style="color:#888;font-size:10px;margin-bottom:8px">'+
        (path.length-1)+' step'+(path.length-1===1?'':'s')+'</div>';
      for(var i=0;i<path.length;i++){
        var step=path[i];
        var fig=CORE_BY_SLUG[step.slug];
        var name=fig?(fig.famous||fig.slug):step.slug;
        html+='<div class="ps-row">'
          +'<span class="ps-num">'+(i+1)+'</span>'
          +'<span class="ps-name" data-slug="'+_esc(step.slug)+'">'+_esc(name)+'</span>'
          +(step.label?'<span class="ps-rel">'+_esc(step.label)+'</span>':'')
          +'</div>';
        if(i<path.length-1)
          html+='<div class="ps-row"><span class="ps-num"></span><span class="ps-arrow">↓</span></div>';
      }
      resultDiv.innerHTML=html;

      // Clickable names in result
      resultDiv.querySelectorAll('.ps-name').forEach(function(el){
        el.addEventListener('click',function(){
          var slug=this.dataset.slug;
          if(slug!==currentFocusSlug) focusStack.push(currentFocusSlug);
          buildGroupView(slug);
        });
      });

      // Walk button
      _pathWalk={path:path,idx:0};
      walkBtn.textContent='Walk path: start →';
      walkBtn.style.display='block';
    },10);
  });

  walkBtn.addEventListener('click',function(){
    if(!_pathWalk) return;
    _pathWalk.idx++;
    if(_pathWalk.idx>=_pathWalk.path.length){ walkBtn.textContent='End of path'; return; }
    var step=_pathWalk.path[_pathWalk.idx];
    if(step.slug!==currentFocusSlug){
      focusStack.push(currentFocusSlug);
      buildGroupView(step.slug);
    }
    var remaining=_pathWalk.path.length-_pathWalk.idx-1;
    if(remaining>0){
      var nxt=CORE_BY_SLUG[_pathWalk.path[_pathWalk.idx+1].slug];
      walkBtn.textContent='Next: '+(nxt?nxt.famous||nxt.slug:'…')+' →';
    } else {
      walkBtn.textContent='End of path';
    }
  });

  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'&&panelOpen) togglePanel();
  });
})();

initThree();

loadAndStart();
