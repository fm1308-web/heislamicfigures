<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Ark — Sandbox v2</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shell.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="config.js"></script>
<script src="mapbase.js"></script>
<script src="anim.js"></script>
<script src="morphology.js"></script>
<!-- Firebase auth — auth.js imports the SDK from gstatic, dispatches gold-ark-auth-ready -->
<script type="module" src="auth.js"></script>
<script src="gate.js"></script>
<script src="feedback.js"></script>
<script src="https://unpkg.com/dom-to-image-more@3.5.0/dist/dom-to-image-more.min.js"></script>
<script src="snapshot.js"></script>
<script src="export.js"></script>
<script src="share.js"></script>
<script src="concepts.js"></script>
<script src="concept-popover.js"></script>
</head>
<body>

<!-- gate.js header-injection anchor (hidden — sandbox shell uses its own pill, but gate.js will keep retrying without this) -->
<div id="hdrRow1Disclosures" style="display:none" aria-hidden="true"></div>

<!-- ENTRY DOOR -->
<div id="entryDoor" class="entry-door">
  <div class="entry-inner">
    <img class="entry-logo" src="assets/gold-ark-logo.png" alt="Gold Ark" />
    <div class="entry-stats">
      <div class="entry-stats-l1">Everything important to the <span class="entry-stats-one">One</span>.</div>
      <div class="entry-stats-l2">In order.</div>
    </div>
    <div class="entry-tagline">Fifteen centuries of Monotheism</div>
    <div class="entry-disclosure">AI-generated · independently verify · Updated May 2026</div>
    <div class="entry-buttons">
      <button class="btn btn-primary" id="btnGuest">Browse as Guest</button>
      <button class="btn btn-secondary" id="btnSignIn">Sign In</button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell" class="app-shell" hidden>

  <!-- ZONE A — TOP BAR -->
  <header class="zone-a">
    <div class="zone-a-row1">
      <button class="flag-btn" id="flagHome" title="Return to Entry Door" aria-label="Home">
        <img class="za-logo" src="assets/gold-ark-logo-text.png" alt="Gold Ark" />
      </button>
      <div class="row1-right">
        <button class="tools-btn" id="howToUseBtn" type="button" aria-label="How to use Gold Ark" title="How to use Gold Ark">HOW TO USE</button>
        <div class="tools-wrap">
          <button class="tools-btn" id="toolsBtn" aria-label="User tools" title="User tools">⚙ TOOLS</button>
          <div class="menu-dropdown tools-dropdown" id="toolsDropdown" hidden>
            <button class="menu-item locked" data-lock="share">Share 🔒</button>
            <button class="menu-item locked" data-lock="snapshot">Snapshot 🔒</button>
            <button class="menu-item locked" data-lock="export">Export 🔒</button>
            <button class="menu-item locked" data-lock="feedback">Report a problem 🔒</button>
            <button class="menu-item" data-action="community">Community forum</button>
            <button class="menu-item locked" data-lock="correction" data-need-role="contributor">Suggest Correction 🔒</button>
            <button class="menu-item" data-action="updates">Updates</button>
          </div>
        </div>
        <div class="user-wrap">
          <button class="user-pill" id="userPill" type="button">Visitor</button>
          <div class="menu-dropdown user-dropdown" id="userDropdown" hidden>
            <button class="menu-item" data-action="signout">Sign out</button>
          </div>
        </div>
      </div>
    </div>
    <nav class="zone-a-row2 tab-row" id="tabRow1"></nav>
    <nav class="zone-a-row3 tab-row" id="tabRow2"></nav>
  </header>

  <!-- ZONE B — VIEW FILTER BAR -->
  <div class="zone-b" id="zoneB"></div>

  <!-- ZONE C — VIEW BODY -->
  <main class="zone-c" id="zoneC">
    <div class="view-placeholder" id="viewPlaceholder">
      <div class="placeholder-name" id="placeholderName">TIMELINE</div>
      <div class="placeholder-sub">View body placeholder</div>
    </div>
  </main>

  <!-- ZONE D — BOTTOM BAR -->
  <footer class="zone-d" id="zoneD">
    <div class="zd-disclaimer">AI-generated · independently verify · Updated May 2026</div>
    <span class="zd-spacer"></span>
    <button class="zd-nav" id="zdBack" type="button" aria-label="Back" title="Back">◀</button>
    <button class="zd-nav" id="zdForward" type="button" aria-label="Forward" title="Forward">▶</button>
    <button class="zd-animate" id="zdAnimate" type="button">
      <span class="zd-animate-icon" id="zdAnimateIcon">▶</span>
      <span class="zd-animate-label" id="zdAnimateLabel">ANIMATE</span>
    </button>
    <button class="zd-speed" id="zdSpeed" type="button">SPEED 1x</button>
    <span class="zd-spacer"></span>
    <button class="zd-tip" id="zdTip" type="button" aria-label="Tip">ⓘ</button>
  </footer>

</div>

<!-- MODALS -->
<div class="modal-backdrop" id="modalBackdrop" hidden>
  <div class="modal" id="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalClose">Close</button>
    </div>
  </div>
</div>

<script src="shell.js"></script>
<script src="tour.js"></script>
</body>
</html>
