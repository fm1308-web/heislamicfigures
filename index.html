<script>
window.openStartAtVerse = window.openStartAtVerse || function(s, v, e){
  var S = +s, V = +v, VE = +(e || v);
  if(!S || !V) { console.warn('[openStartAtVerse stub] bad args:', s, v, e); return; }
  window._stPendingJump = { surah: S, vstart: V, vend: VE };
  var tabs = document.querySelectorAll('#tabRow1 button, #tabRow1 a, #tabRow2 button, #tabRow2 a, [data-view="start"], [data-tab="START"], .tab-btn, .tab-start');
  for(var i=0;i<tabs.length;i++){
    var el = tabs[i];
    var txt = (el.textContent || '').trim().toUpperCase();
    var dv = el.getAttribute('data-view') || '';
    var dt = el.getAttribute('data-tab') || '';
    if(txt === 'START' || dv === 'start' || dt === 'START'){ el.click(); break; }
  }
};
</script>
<script>
// Eager-load quran_xref.json once at boot and populate window.QURAN_XREF_BY_SLUG
// so timeline / one / any view can render verified prophet verse chips.
// Source file rebuilt by RV44 — direct name mentions only, all double-verified.
(function(){
  try {
    fetch(dataUrl('data/islamic/quran/quran_xref.json'))
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(data){
        if(!data || !Array.isArray(data.figure_refs)) return;
        var idx = {};
        data.figure_refs.forEach(function(r){
          if(!r || !r.slug) return;
          if(!idx[r.slug]) idx[r.slug] = [];
          idx[r.slug].push(r);
        });
        // Sort each figure's refs by surah, then verse_start.
        Object.keys(idx).forEach(function(k){
          idx[k].sort(function(a,b){
            if(a.surah !== b.surah) return a.surah - b.surah;
            return (a.verse_start||0) - (b.verse_start||0);
          });
        });
        window.QURAN_XREF_BY_SLUG = idx;
        window.dispatchEvent(new Event('quran-xref-ready'));
      })
      .catch(function(e){ console.warn('[quran-xref-loader] fetch failed', e); });
  } catch(e){ console.warn('[quran-xref-loader] init failed', e); }
})();
</script>
