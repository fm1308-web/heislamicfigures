<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slides</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#1B2631;color:#D4AF37;font-family:'Segoe UI',system-ui,sans-serif}
#top-bar{position:fixed;top:0;left:0;right:0;height:42px;display:flex;align-items:center;padding:0 14px;z-index:10;background:rgba(10,14,26,.92);border-bottom:1px solid rgba(212,175,55,.15)}
#back-btn{background:none;border:1px solid rgba(212,175,55,.3);color:#D4AF37;font-size:11px;padding:4px 12px;border-radius:4px;cursor:pointer;font-family:'Segoe UI',sans-serif;letter-spacing:.04em}
#back-btn:hover{background:rgba(212,175,55,.1)}
#counter{margin-left:auto;font-size:11px;color:rgba(212,175,55,.6);letter-spacing:.05em}
#slide-area{position:fixed;top:42px;bottom:52px;left:0;right:0;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:pan-y}
#slide-area img{max-width:min(900px,96vw);max-height:calc(100vh - 110px);object-fit:contain;border-radius:4px;box-shadow:0 2px 20px rgba(0,0,0,.5);transition:opacity .15s}
#nav-bar{position:fixed;bottom:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:center;gap:24px;background:rgba(10,14,26,.92);border-top:1px solid rgba(212,175,55,.15)}
.nav-btn{background:none;border:1px solid rgba(212,175,55,.35);color:#D4AF37;font-size:12px;padding:8px 24px;border-radius:4px;cursor:pointer;font-family:'Segoe UI',sans-serif;letter-spacing:.06em;transition:background .12s}
.nav-btn:hover{background:rgba(212,175,55,.1)}
.nav-btn:disabled{opacity:.25;cursor:default}
.nav-btn:disabled:hover{background:none}
</style>
</head>
<body>

<div id="top-bar">
  <button id="back-btn" onclick="goBack()">&#8592; BACK</button>
  <div id="counter"></div>
</div>

<div id="slide-area">
  <img id="slide-img" src="" alt="Slide">
</div>

<div id="nav-bar">
  <button class="nav-btn" id="prev-btn" onclick="go(-1)">&#9664; PREV</button>
  <button class="nav-btn" id="next-btn" onclick="go(1)">NEXT &#9654;</button>
</div>

];
let cur=0;
const img=document.getElementById('slide-img');
const counter=document.getElementById('counter');
const prevBtn=document.getElementById('prev-btn');
const nextBtn=document.getElementById('next-btn');

function show(i){
  cur=Math.max(0,Math.min(SLIDES.length-1,i));
  img.src='data:image/jpeg;base64,'+SLIDES[cur];
  counter.textContent='Slide '+(cur+1)+' of '+SLIDES.length;
  prevBtn.disabled=cur===0;
  nextBtn.disabled=cur===SLIDES.length-1;
}
function go(d){show(cur+d)}
function goBack(){
  try{window.parent.postMessage('close-slides','*')}catch(e){}
  if(window.history.length>1) window.history.back();
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ') go(1);
  else if(e.key==='ArrowLeft') go(-1);
  else if(e.key==='Escape') goBack();
});

// Touch swipe
let _tx=null;
document.getElementById('slide-area').addEventListener('touchstart',e=>{_tx=e.changedTouches[0].clientX},{passive:true});
document.getElementById('slide-area').addEventListener('touchend',e=>{
  if(_tx===null) return;
  const dx=e.changedTouches[0].clientX-_tx;
  _tx=null;
  if(Math.abs(dx)>40){ if(dx<0) go(1); else go(-1); }
},{passive:true});

show(0);
</script>
